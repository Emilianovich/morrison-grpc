syntax = "proto3";

package auth;

option java_package = "com.pequenomorrison.grpc.auth";
option java_multiple_files = true;

// AuthService: registro, login y logout de clientes.
// La API REST extrae el session_id de la cookie HTTP y lo reenvia aqui.
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (AuthResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  // UUID de la sesion recien creada (tabla sessions.id)
  string session_id = 1;
  string client_name = 2;
}

message RegisterRequest {
  string full_name = 1;
  string email = 2;
  string password = 3;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
}

message LogoutRequest {
  string session_id = 1;
}
