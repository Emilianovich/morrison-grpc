syntax = "proto3";

package clients;

option java_package = "com.pequenomorrison.grpc.clients";
option java_multiple_files = true;

// ClientService: consulta de perfil del cliente autenticado.
service ClientService {
  rpc GetClient(GetClientRequest) returns (GetClientResponse);
}

message GetClientRequest {
  string session_id = 1;
}

message GetClientResponse {
  string full_name = 1;
  string email = 2;
  int64 money_amount_in_cents = 3;
}
